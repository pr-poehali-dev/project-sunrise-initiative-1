<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finflow — офлайн</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#09090B; color:#fff; font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; }
  .wrap { text-align:center; padding:24px; max-width:420px; }
  h1 { font-size:28px; margin:0 0 12px; letter-spacing:-0.02em; }
  p { color:#a1a1aa; line-height:1.5; }
  button { margin-top:20px; padding:12px 24px; background:#10b981; color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Нет соединения</h1>
    <p>Проверьте интернет и попробуйте ещё раз. Ваши данные сохранены в кэше.</p>
    <button onclick="location.reload()">Повторить</button>
  </div>
</body>
</html>
